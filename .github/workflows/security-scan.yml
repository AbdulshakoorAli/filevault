# =============================================================================
# DevSecOps — Security analysis pipeline
# =============================================================================
# Runs on every push and PR. Three checks:
#   1. CodeQL (SAST)          — GitHub's static analysis for Java
#   2. OWASP Dependency-Check — known CVEs in Maven dependencies
#   3. Gitleaks               — secret detection in code history
# =============================================================================

name: Security Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ---------- 1. CodeQL — Static Application Security Testing (SAST) ----------
  codeql:
    name: "SAST — CodeQL"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build for CodeQL
        working-directory: functions
        run: mvn -B clean package -DskipTests

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

  # ---------- 2. OWASP Dependency-Check (SCA) ----------
