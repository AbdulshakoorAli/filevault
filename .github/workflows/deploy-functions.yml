# =============================================================================
# GitHub Actions — Java Functions deploy (Maven tests, then package)
# =============================================================================
# Secrets: AZURE_FUNCTIONAPP_NAME, AZURE_FUNCTIONAPP_PUBLISH_PROFILE (repo Settings → Actions).
# =============================================================================

name: Deploy Azure Functions

on:
  push:
    branches: [main, master]
    paths:
      - "functions/**"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Functions — unit tests & package
        working-directory: functions
        run: mvn -B clean package

      # Maven puts host.json + functions inside target/azure-functions/<functionAppName>/ (see functions/pom.xml).
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: functions/target/azure-functions/filevault-functions
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-pom-xml: true
