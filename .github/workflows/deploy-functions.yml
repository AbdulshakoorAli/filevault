# =============================================================================
# DevSecOps — Build → Security gate → Deploy
# =============================================================================
# Secrets: AZURE_FUNCTIONAPP_NAME, AZURE_FUNCTIONAPP_PUBLISH_PROFILE
# Security checks run BEFORE deploy. Deploy is skipped if security fails.
# =============================================================================

name: Deploy Azure Functions

on:
  push:
    branches: [main, master]
    paths:
      - "functions/**"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # -------- Stage 1: Build + Test --------
  build:
    name: "Build & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build & unit tests
        working-directory: functions
        run: mvn -B clean package

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-package
          path: functions/target/azure-functions/filevault-functions

  # -------- Stage 2: Security checks (runs in parallel) --------
  dependency-check:
    name: "SCA — Dependency Check"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: OWASP Dependency-Check
        working-directory: functions
        run: mvn -B dependency-check:check

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: functions/target/dependency-check-report.*
          retention-days: 30

  secret-scan:
    name: "Secret Scan — Gitleaks"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------- Stage 3: Deploy (only if security passed) --------
  deploy:
    name: "Deploy to Azure"
    runs-on: ubuntu-latest
    needs: [build, dependency-check, secret-scan]
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: function-package
          path: deploy-package

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: deploy-package
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
