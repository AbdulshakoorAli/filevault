server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
azure:
  document-intelligence:
    endpoint: ${AZURE_DOC_INTEL_ENDPOINT:}
    key: ${AZURE_DOC_INTEL_KEY:}
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING:}
    container-name: ${AZURE_STORAGE_CONTAINER_NAME:filevault-documents}
    uploads-table-name: ${AZURE_UPLOADS_TABLE_NAME:filevaultuploads}
  communication:
    connection-string: ${ACS_CONNECTION_STRING:}
    sender-email: ${ACS_SENDER_EMAIL:}

logging:
  level:
    com.filevault: DEBUG
    com.azure: INFO